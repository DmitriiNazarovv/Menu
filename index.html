const CATEGORIES = [
  { key: "breakfast", label: "Завтрак" },
  { key: "lunch", label: "Обед" },
  { key: "dinner", label: "Ужин" },
  { key: "snack", label: "Перекус" }
];

/* =========================================================
   JSONBIN
   ========================================================= */
const JSONBIN_ID = "6a2da444da38895dfebb3efa";
const JSONBIN_KEY = "$2a$10$4wA7T6em0ATgsI36drn8Ie4xNUEB77cklSxKuv7LOXVJbQAhds2Xe";
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

let cloudData = { favorites: {}, plan: {}, customDishes: [] };
let allDishes = [];

async function loadCloud(){
  const res = await fetch(JSONBIN_URL + "/latest", {
    headers: { "X-Master-Key": JSONBIN_KEY }
  });
  if (!res.ok) throw new Error("HTTP error " + res.status);
  const data = await res.json();
  cloudData = data.record || { favorites: {}, plan: {}, customDishes: [] };
  if(!cloudData.favorites) cloudData.favorites = {};
  if(!cloudData.plan) cloudData.plan = {};
  if(!cloudData.customDishes) cloudData.customDishes = [];
  window._cloudLoadError = false;
}

async function saveCloud(){
  const res = await fetch(JSONBIN_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_KEY
    },
    body: JSON.stringify(cloudData)
  });
  if (!res.ok) throw new Error("HTTP error " + res.status);
  return true;
}

/* =========================================================
   Управление блюдами
   ========================================================= */
function prepareAllDishes(){
  const dishes = [];
  for (const cat of CATEGORIES) {
    const list = MENU[cat.key] || [];
    list.forEach(d => {
      dishes.push({ ...d, category: cat.key, isCustom: false });
    });
  }
  (cloudData.customDishes || []).forEach(d => {
    dishes.push({ ...d, isCustom: true });
  });
  allDishes = dishes;
}

function getDishById(id){
  return allDishes.find(d => d.id === id);
}

function isFavorite(dish){
  if(cloudData.favorites.hasOwnProperty(dish.id)) return cloudData.favorites[dish.id];
  return !!dish.favorite;
}

async function toggleFavorite(dish){
  const newVal = !isFavorite(dish);
  cloudData.favorites[dish.id] = newVal;
  try {
    await saveCloud();
    render();
  } catch(e) {
    cloudData.favorites[dish.id] = !newVal;
    alert("Не удалось сохранить избранное. Проверьте соединение.");
  }
}

/* =========================================================
   Утилиты дат
   ========================================================= */
function formatDateLabel(dateStr){
  const [y,m,dd] = dateStr.split("-").map(Number);
  const d = new Date(y, m-1, dd);
  return d.toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
}

function todayDateStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function tomorrowDateStr(){
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

  ['mainView','todayView','tomorrowView','adminView'].forEach(id => {
    document.getElementById(id).style.display = (id === viewId+'View' || (viewId==='main' && id==='mainView')) ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === viewId);
  });

  if (viewId === 'today') renderTodayView();
  if (viewId === 'tomorrow') renderTomorrowView();
  if (viewId === 'admin') renderAdmin();
  if (viewId === 'main') render();
}

/* =========================================================
   Функция отображения плана (сводка)
   ========================================================= */
function renderPlanSummary(dateStr, contentEl, editFormEl, saveBtnEl, statusEl, emptyMessage, addButtonLabel, saveCallback){
  const dayPlan = cloudData.plan[dateStr] || {};
  contentEl.innerHTML = "";
  editFormEl.style.display = "none";
  saveBtnEl.style.display = "none";

  const activeEntries = Object.entries(dayPlan).filter(([cat, dishId]) => dishId && dishId !== "skip");
  if(activeEntries.length === 0){
    contentEl.innerHTML = `
      <div class="empty">
        ${emptyMessage}<br><br>
        <button class="fav-btn" id="showPlanEditBtn">${addButtonLabel}</button>
      </div>
    `;
    document.getElementById("showPlanEditBtn").addEventListener("click", () => showEditForm(dateStr, editFormEl, saveBtnEl, contentEl, saveCallback));
    return;
  }

  let totalKcal = 0, totalProtein = 0, totalFat = 0, totalCarbs = 0;

  CATEGORIES.forEach(cat => {
    const dishId = dayPlan[cat.key];
    if(!dishId || dishId === "skip") return;
    const dish = getDishById(dishId);
    if(!dish) return;

    const card = document.createElement("div");
    card.className = "today-card";
    card.innerHTML = `
      <div class="cat-label">${cat.label}</div>
      <div class="dish-name">${dish.name}</div>
      <div class="dish-meta">${dish.kcal} ккал · ${dish.portion}</div>
    `;
    contentEl.appendChild(card);

    totalKcal += dish.kcal;
    totalProtein += dish.protein;
    totalFat += dish.fat;
    totalCarbs += dish.carbs;
  });

  if (totalKcal > 0) {
    const statsBlock = document.createElement("div");
    statsBlock.className = "today-stats";
    statsBlock.innerHTML = `
      <div class="stats-title">Итого за день</div>
      <div class="stats">
        <div class="stat"><div class="num">${totalKcal}</div><div class="lbl">ккал</div></div>
        <div class="stat"><div class="num">${totalProtein}г</div><div class="lbl">белки</div></div>
        <div class="stat"><div class="num">${totalFat}г</div><div class="lbl">жиры</div></div>
        <div class="stat"><div class="num">${totalCarbs}г</div><div class="lbl">углеводы</div></div>
      </div>
    `;
    contentEl.appendChild(statsBlock);
  }

  const editBtn = document.createElement("button");
  editBtn.className = "edit-btn";
  editBtn.textContent = "✎ Изменить";
  editBtn.addEventListener("click", () => showEditForm(dateStr, editFormEl, saveBtnEl, contentEl, saveCallback));
  contentEl.appendChild(editBtn);
}

function showEditForm(dateStr, editFormEl, saveBtnEl, contentEl, saveCallback){
  contentEl.innerHTML = "";
  editFormEl.style.display = "block";
  saveBtnEl.style.display = "block";

  const dayPlan = cloudData.plan[dateStr] || {};
  editFormEl.innerHTML = "";

  CATEGORIES.forEach(cat => {
    const row = document.createElement("div");
    row.className = "plan-row";

    const label = document.createElement("label");
    label.textContent = cat.label;
    row.appendChild(label);

    const select = document.createElement("select");
    select.dataset.cat = cat.key;

    const emptyOpt = document.createElement("option");
    emptyOpt.value = "";
    emptyOpt.textContent = "— не выбрано —";
    select.appendChild(emptyOpt);

    const skipOpt = document.createElement("option");
    skipOpt.value = "skip";
    skipOpt.textContent = "— пропустить —";
    select.appendChild(skipOpt);

    const dishesForCat = allDishes.filter(d => d.category === cat.key).sort((a,b) => a.name.localeCompare(b.name, "ru"));
    dishesForCat.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.textContent = d.name;
      if(dayPlan[cat.key] === d.id) opt.selected = true;
      select.appendChild(opt);
    });

    if(dayPlan[cat.key] === "skip") skipOpt.selected = true;

    row.appendChild(select);
    editFormEl.appendChild(row);
  });

  saveBtnEl.onclick = saveCallback;
}

/* =========================================================
   Сегодня
   ========================================================= */
function renderTodayView(){
  const dateStr = todayDateStr();
  document.getElementById("todayTitle").textContent = "Сегодня";
  document.getElementById("todaySubtitle").textContent = formatDateLabel(dateStr);

  renderPlanSummary(
    dateStr,
    document.getElementById("todayContent"),
    document.getElementById("todayEditForm"),
    document.getElementById("todaySaveBtn"),
    document.getElementById("todayStatus"),
    "На сегодня ничего не запланировано.",
    "Добавить план на сегодня",
    saveTodayPlan
  );
}

async function saveTodayPlan(){
  const dateStr = todayDateStr();
  const status = document.getElementById("todayStatus");
  status.textContent = "Сохранение...";

  const dayPlan = {};
  document.querySelectorAll("#todayEditForm select").forEach(sel => {
    const val = sel.value;
    if(val === "skip") dayPlan[sel.dataset.cat] = "skip";
    else if(val) dayPlan[sel.dataset.cat] = val;
  });

  if(Object.keys(dayPlan).length === 0){
    delete cloudData.plan[dateStr];
  }else{
    cloudData.plan[dateStr] = dayPlan;
  }

  try {
    await saveCloud();
    status.textContent = "Сохранено ✓";
    renderTodayView();
  } catch(e) {
    status.textContent = "Ошибка сохранения";
  }
  setTimeout(() => { status.textContent = ""; }, 2500);
}

/* =========================================================
   Админка
   ========================================================= */
function renderAdmin(){
  const listEl = document.getElementById("adminDishList");
  listEl.innerHTML = "";

  const dishesByCat = {};
  allDishes.forEach(d => {
    const cat = d.category || "other";
    if(!dishesByCat[cat]) dishesByCat[cat] = [];
    dishesByCat[cat].push(d);
  });

  for(const cat of CATEGORIES){
    const dishes = dishesByCat[cat.key] || [];
    if(dishes.length === 0) continue;
    const catHeader = document.createElement("div");
    catHeader.className = "cat-label";
    catHeader.textContent = cat.label;
    catHeader.style.marginTop = "20px";
    listEl.appendChild(catHeader);

    dishes.forEach(d => {
      const item = document.createElement("div");
      item.className = "admin-dish-item";
      item.innerHTML = `
        <div>
          <div class="info">${d.name} ${d.isCustom ? '(моё)' : '(встроенное)'}</div>
          <div class="meta">${d.kcal} ккал · ${d.category}</div>
        </div>
        ${d.isCustom ? '<button class="delete-dish-btn">Удалить</button>' : ''}
      `;
      if(d.isCustom){
        item.querySelector('.delete-dish-btn').addEventListener('click', () => deleteCustomDish(d.id));
      }
      listEl.appendChild(item);
    });
  }

  if (allDishes.length === 0) {
    listEl.innerHTML = '<div class="empty">Блюд пока нет</div>';
  }

  const formContainer = document.getElementById("addDishForm");
  formContainer.style.display = 'none';
  formContainer.innerHTML = `
    <label>Название</label>
    <input type="text" id="newDishName" placeholder="Название блюда">
    <label>Категория</label>
    <select id="newDishCategory">
      ${CATEGORIES.map(c => `<option value="${c.key}">${c.label}</option>`).join('')}
    </select>
    <label>Ккал</label>
    <input type="number" id="newDishKcal" placeholder="320">
    <label>Белки (г)</label>
    <input type="number" id="newDishProtein" placeholder="12">
    <label>Жиры (г)</label>
    <input type="number" id="newDishFat" placeholder="9">
    <label>Углеводы (г)</label>
    <input type="number" id="newDishCarbs" placeholder="45">
    <label>Порция (пример: 300 г)</label>
    <input type="text" id="newDishPortion" placeholder="300 г">
    <label>Время приготовления</label>
    <input type="text" id="newDishTime" placeholder="15 мин">
    <label>Ингредиенты</label>
    <textarea id="newDishIngredients" placeholder="Список ингредиентов"></textarea>
    <label>Рецепт</label>
    <textarea id="newDishRecipe" placeholder="Пошаговое приготовление"></textarea>
    <label>Теги (через запятую)</label>
    <input type="text" id="newDishTags" placeholder="быстро, вегетарианское">
    <button class="save-btn" id="submitNewDishBtn">Добавить</button>
  `;

  document.getElementById("showAddFormBtn").onclick = () => {
    formContainer.style.display = formContainer.style.display === 'none' ? 'block' : 'none';
  };

  document.getElementById("submitNewDishBtn").addEventListener('click', addCustomDish);
}

async function addCustomDish(){
  const name = document.getElementById("newDishName").value.trim();
  if(!name) return alert("Введите название");
  const category = document.getElementById("newDishCategory").value;
  const newDish = {
    id: "custom_" + Date.now(),
    name,
    category,
    kcal: Number(document.getElementById("newDishKcal").value) || 0,
    protein: Number(document.getElementById("newDishProtein").value) || 0,
    fat: Number(document.getElementById("newDishFat").value) || 0,
    carbs: Number(document.getElementById("newDishCarbs").value) || 0,
    portion: document.getElementById("newDishPortion").value || "—",
    time: document.getElementById("newDishTime").value || "—",
    ingredients: document.getElementById("newDishIngredients").value || "",
    recipe: document.getElementById("newDishRecipe").value || "",
    tags: document.getElementById("newDishTags").value.split(",").map(t => t.trim()).filter(Boolean),
    favorite: false
  };

  cloudData.customDishes.push(newDish);
  try {
    await saveCloud();
    prepareAllDishes();
    renderAdmin();
    document.querySelectorAll("#addDishForm input, #addDishForm textarea").forEach(el => el.value = '');
    document.getElementById("addDishForm").style.display = 'none';
  } catch(e) {
    alert("Ошибка сохранения");
  }
}

async function deleteCustomDish(id){
  cloudData.customDishes = cloudData.customDishes.filter(d => d.id !== id);
  Object.keys(cloudData.plan).forEach(date => {
    const day = cloudData.plan[date];
    for (const cat in day) {
      if (day[cat] === id) delete day[cat];
    }
    if (Object.keys(day).length === 0) delete cloudData.plan[date];
  });

  try {
    await saveCloud();
    prepareAllDishes();
    renderAdmin();
    if (document.getElementById("mainView").style.display !== 'none') render();
  } catch(e) {
    alert("Ошибка удаления");
  }
}

/* =========================================================
   Главный экран
   ========================================================= */
const tabsEl = document.getElementById("tabs");
const contentEl = document.getElementById("content");
const searchInput = document.getElementById("searchInput");
let active = "breakfast";
let searchQuery = "";

function renderCloudError(){
  const errEl = document.getElementById("cloudError");
  if (window._cloudLoadError) {
    errEl.style.display = "block";
    errEl.innerHTML = `
      <div class="error-msg">
        Не удалось загрузить данные.<br>Проверьте подключение к интернету.
        <br><button id="retryCloudBtn">Повторить попытку</button>
      </div>
    `;
    document.getElementById("retryCloudBtn").addEventListener("click", retryLoadCloud);
  } else {
    errEl.style.display = "none";
  }
}

async function retryLoadCloud(){
  document.getElementById("cloudError").innerHTML = `<div class="empty">Загрузка...</div>`;
  try {
    await loadCloud();
    prepareAllDishes();
    render();
    renderCloudError();
  } catch(e) {
    window._cloudLoadError = true;
    renderCloudError();
  }
}

function renderDish(d){
  const card = document.createElement("div");
  card.className = "dish";

  const head = document.createElement("div");
  head.className = "dish-head";
  head.innerHTML = `
    <div class="dish-name">${d.name}</div>
    <div class="dish-meta">${d.kcal} ккал · ${d.time}</div>
  `;
  head.addEventListener("click", () => card.classList.toggle("open"));

  const body = document.createElement("div");
  body.className = "dish-body";
  body.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num">${d.kcal}</div><div class="lbl">ккал</div></div>
      <div class="stat"><div class="num">${d.protein}г</div><div class="lbl">белки</div></div>
      <div class="stat"><div class="num">${d.fat}г</div><div class="lbl">жиры</div></div>
      <div class="stat"><div class="num">${d.carbs}г</div><div class="lbl">углеводы</div></div>
    </div>
    <div class="block">
      <div class="block-label">Порция</div>
      <div class="block-text">${d.portion}</div>
    </div>
    <div class="block">
      <div class="block-label">Состав</div>
      <div class="block-text">${d.ingredients}</div>
    </div>
    <div class="block">
      <div class="block-label">Приготовление</div>
      <div class="block-text">${d.recipe}</div>
    </div>
  `;

  const favBtn = document.createElement("button");
  favBtn.className = "fav-btn";
  const fav = isFavorite(d);
  favBtn.textContent = fav ? "Убрать из избранного" : "Добавить в избранное";
  favBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleFavorite(d);
  });
  body.appendChild(favBtn);

  card.appendChild(head);
  card.appendChild(body);
  return card;
}

function filterDishes(list){
  if (!searchQuery) return list;
  const q = searchQuery.toLowerCase();
  return list.filter(d => {
    const haystack = (d.name + " " + d.ingredients + " " + (d.tags||[]).join(" ") + " " + (d.recipe||"")).toLowerCase();
    return haystack.includes(q);
  });
}

function render(){
  [...tabsEl.children].forEach(b => b.classList.toggle("active", b.dataset.key === active));

  const dishesForCat = allDishes.filter(d => d.category === active);
  const filtered = filterDishes(dishesForCat);
  contentEl.innerHTML = "";

  if(filtered.length === 0){
    contentEl.innerHTML = searchQuery
      ? '<div class="empty">Ничего не найдено</div>'
      : '<div class="empty">Пока ничего не добавлено</div>';
    return;
  }

  const favorites = filtered.filter(d => isFavorite(d)).sort((a,b) => a.name.localeCompare(b.name, "ru"));
  const others = filtered.filter(d => !isFavorite(d)).sort((a,b) => a.name.localeCompare(b.name, "ru"));

  [...favorites, ...others].forEach(d => contentEl.appendChild(renderDish(d)));
}

/* =========================================================
   Инициализация
   ========================================================= */
async function init(){
  document.getElementById("today").textContent = new Date().toLocaleDateString("ru-RU", {
    weekday: "long", day: "numeric", month: "long"
  });

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => setView(btn.dataset.view));
  });

  document.querySelectorAll('[data-back]').forEach(btn => {
    btn.addEventListener('click', () => setView('main'));
  });

  searchInput.addEventListener("input", (e) => {
    searchQuery = e.target.value.trim();
    render();
  });

  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.label;
    btn.dataset.key = cat.key;
    if(cat.key === active) btn.classList.add("active");
    btn.addEventListener("click", () => {
      active = cat.key;
      render();
    });
    tabsEl.appendChild(btn);
  });

  try {
    await loadCloud();
  } catch(e) {
    window._cloudLoadError = true;
  }
  prepareAllDishes();
  setView('main');
  renderCloudError();
}

init();
</script>
